# 依存更新の場合、アプリケーションのバージョンは変えずにデプロイする
name: Web Auto Deploy Dependencies
on:
  push:
    branches: [main]

jobs:
  check-and-deploy:
    environment: web
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      is_dep_update: ${{ steps.check-deps.outputs.is_dep_update }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 2

      - name: Check if last commit was from dependency update
        id: check-deps
        run: |
          LAST_COMMIT_MESSAGE=$(git log -1 --pretty=format:"%s")
          LAST_COMMIT_AUTHOR=$(git log -1 --pretty=format:"%an")
          echo "Last commit message: $LAST_COMMIT_MESSAGE"
          echo "Last commit author: $LAST_COMMIT_AUTHOR"

          if echo "$LAST_COMMIT_MESSAGE" | grep -E "(renovate|dependabot)" > /dev/null || \
            echo "$LAST_COMMIT_AUTHOR" | grep -E "(renovate|dependabot)" > /dev/null; then
            echo "is_dep_update=true" >> $GITHUB_OUTPUT
            echo "Dependency update detected - proceeding with deployment"
          else
            echo "is_dep_update=false" >> $GITHUB_OUTPUT
            echo "No dependency update detected - skipping deployment"
          fi

      - name: Setup pnpm
        if: steps.check-deps.outputs.is_dep_update == 'true'
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Setup Node.js
        if: steps.check-deps.outputs.is_dep_update == 'true'
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version-file: ".node-version"
          cache: "pnpm"

      - name: Install dependencies
        if: steps.check-deps.outputs.is_dep_update == 'true'
        run: pnpm install --frozen-lockfile

      - name: Create .env file
        run: |
          echo "PUBLIC_REPORT_BUG_URL=${{ vars.PUBLIC_REPORT_BUG_URL }}" > packages/web/.env
          echo "PUBLIC_REPORT_REQUEST_URL=${{ vars.PUBLIC_REPORT_REQUEST_URL }}" >> packages/web/.env
          echo "PUBLIC_LOG_LEVEL=${{ vars.PUBLIC_LOG_LEVEL }}" >> packages/web/.env
          echo "PUBLIC_API_ENDPOINT=${{ vars.PUBLIC_API_ENDPOINT }}" >> packages/web/.env

      - name: Build
        if: steps.check-deps.outputs.is_dep_update == 'true'
        run: pnpm run build

      - name: Configure GitHub Pages
        if: steps.check-deps.outputs.is_dep_update == 'true'
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Upload GitHub Pages artifact
        if: steps.check-deps.outputs.is_dep_update == 'true'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: packages/web/dist

      - name: Deploy to Cloudflare Pages
        if: steps.check-deps.outputs.is_dep_update == 'true'
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy packages/web/dist --project-name=ac6-assemble-tool --commit-dirty=true

  # google評価移行後は削除
  deploy-github-pages:
    needs: check-and-deploy
    if: needs.check-and-deploy.outputs.is_dep_update == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
